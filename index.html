<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #06060f;
  --bg-secondary: #0d0d1a;
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-hover: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.06);
  --text-primary: #e8e8f0;
  --text-secondary: #8888a8;
  --text-muted: #555570;
  --accent-blue: #4361ee;
  --accent-purple: #7c3aed;
  --accent-pink: #ec4899;
  --accent-emerald: #10b981;
  --accent-amber: #f59e0b;
  --accent-red: #ef4444;
  --radius: 16px;
  --radius-sm: 10px;
  --twitter: #1DA1F2; --weibo: #FF8200; --xiaohongshu: #FF2442;
  --douyin: #00F2EA; --instagram: #E1306C; --techcrunch: #00D084;
  --theverge: #E5127D; --arstechnica: #FF6600; --venturebeat: #2563EB;
  --wired: #BFBFBF; --mit: #A31F34; --jiqizhixin: #2196F3;
  --qbitai: #8B5CF6; --36kr: #0078FF; --infoq: #007ACC; --general: #6C63FF;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; min-height: 100vh;
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
}
.bg-glow { position: fixed; z-index: 0; pointer-events: none; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.12; }
.bg-glow-1 { top: -200px; left: -100px; background: var(--accent-purple); }
.bg-glow-2 { bottom: -200px; right: -100px; background: var(--accent-blue); }

/* ── Password Gate ──────────────────── */
#pwGate {
  position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center;
  background: var(--bg-primary);
}
#pwGate .pw-box {
  text-align: center; padding: 48px 40px; width: 380px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
}
#pwGate h2 {
  font-size: 1.6rem; font-weight: 800; margin-bottom: 8px;
  background: linear-gradient(135deg, #e8e8f0, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
#pwGate .pw-sub { color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 28px; }
#pwGate input {
  width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-primary); font-size: 1rem; outline: none; text-align: center;
  letter-spacing: 2px; transition: border 0.2s;
}
#pwGate input:focus { border-color: var(--accent-purple); }
#pwGate .pw-btn {
  display: block; width: 100%; margin-top: 16px; padding: 12px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
  border: none; border-radius: var(--radius-sm); color: #fff;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
#pwGate .pw-btn:hover { opacity: 0.9; }
#pwGate .pw-err { color: var(--accent-red); font-size: 0.82rem; margin-top: 12px; display: none; }

/* ── Main Container ─────────────────── */
#app { display: none; position: relative; z-index: 1; }
.container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
header { text-align: center; margin-bottom: 32px; }
header h1 {
  font-size: 2.6rem; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #e8e8f0 0%, #a78bfa 50%, #60a5fa 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header .subtitle { color: var(--text-secondary); font-size: 0.95rem; margin-top: 6px; }

/* ── Date Navigator ─────────────────── */
.date-nav {
  display: flex; align-items: center; justify-content: center; gap: 16px;
  margin-bottom: 36px; flex-wrap: wrap; position: relative; z-index: 100;
}
.date-nav .nav-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary); font-size: 1.1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.date-nav .nav-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); }
.date-nav .nav-btn:disabled { opacity: 0.3; cursor: default; }
.date-nav .current-date {
  font-size: 1.15rem; font-weight: 700; color: #c4b5fd;
  padding: 8px 24px; border-radius: 999px;
  background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.2);
  cursor: pointer; position: relative;
}
.date-nav .date-list {
  position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 0; min-width: 200px; max-height: 320px; overflow-y: auto; z-index: 999;
  display: none; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}
.date-nav .date-list.open { display: block; }
.date-nav .date-list button {
  display: block; width: 100%; padding: 8px 20px; border: none; background: none;
  color: var(--text-secondary); font-size: 0.88rem; text-align: left; cursor: pointer;
  transition: all 0.15s;
}
.date-nav .date-list button:hover { background: rgba(124,58,237,0.1); color: var(--text-primary); }
.date-nav .date-list button.active { color: #c4b5fd; font-weight: 600; }

/* ── Stats ──────────────────────────── */
.stats { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
.stat-card {
  display: flex; align-items: center; gap: 12px; padding: 14px 22px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
}
.stat-icon { font-size: 1.5rem; }
.stat-value { font-size: 1.4rem; font-weight: 700; line-height: 1; }
.stat-label { font-size: 0.76rem; color: var(--text-secondary); margin-top: 2px; }

/* ── Summary ────────────────────────── */
.summary-panel {
  margin-bottom: 36px; padding: 28px;
  background: linear-gradient(135deg, rgba(124,58,237,0.06), rgba(67,97,238,0.04));
  border: 1px solid rgba(124,58,237,0.15); border-radius: var(--radius);
  position: relative; overflow: hidden;
}
.summary-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue), var(--accent-pink));
}
.summary-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.summary-header h2 {
  font-size: 1.2rem; font-weight: 700;
  background: linear-gradient(135deg, #c4b5fd, #93c5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.ai-badge {
  padding: 3px 10px; border-radius: 999px; font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.5px; background: rgba(124,58,237,0.2); color: #c4b5fd;
  border: 1px solid rgba(124,58,237,0.3);
}
.summary-overview {
  font-size: 0.92rem; line-height: 1.8; color: var(--text-secondary);
  margin-bottom: 20px; padding: 14px 18px;
  background: rgba(0,0,0,0.2); border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent-purple);
}
.summary-highlights { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.highlight-item {
  display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px;
  background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04);
  border-radius: var(--radius-sm);
}
.highlight-tag { flex-shrink: 0; font-size: 1rem; width: 26px; text-align: center; }
.highlight-text { font-size: 0.88rem; line-height: 1.7; color: var(--text-primary); }
.summary-trend {
  font-size: 0.85rem; line-height: 1.75; color: var(--text-secondary);
  padding: 12px 16px; background: rgba(16,185,129,0.05);
  border: 1px solid rgba(16,185,129,0.1); border-radius: var(--radius-sm);
}

/* ── Filter + Search ────────────────── */
.search-box { display: flex; justify-content: center; margin-bottom: 24px; }
.search-box input {
  width: 100%; max-width: 500px; padding: 11px 18px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-primary);
  font-size: 0.92rem; outline: none; transition: border 0.2s;
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box input:focus { border-color: var(--accent-purple); }
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
.filter-btn {
  padding: 7px 18px; border: 1px solid var(--border); border-radius: 999px;
  background: transparent; color: var(--text-secondary); cursor: pointer;
  font-size: 0.82rem; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent-purple); color: var(--text-primary); }
.filter-btn.active {
  background: rgba(124,58,237,0.18); border-color: var(--accent-purple);
  color: #c4b5fd; font-weight: 600;
}

/* ── Trending ───────────────────────── */
.trending-section {
  margin-bottom: 32px; padding: 24px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
}
.trending-section h3 { font-size: 1rem; margin-bottom: 14px; color: var(--text-secondary); }
.trending-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.trending-tag {
  padding: 5px 14px; border-radius: 999px; font-size: 0.8rem; cursor: pointer;
  background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.15);
  color: #c4b5fd; transition: all 0.2s;
}
.trending-tag:hover { background: rgba(124,58,237,0.18); }

/* ── News Grid ──────────────────────── */
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 18px; }
.news-card {
  padding: 22px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); transition: all 0.3s ease; overflow: hidden;
  animation: fadeUp 0.4s ease both;
}
.news-card:hover {
  background: var(--bg-card-hover); border-color: rgba(255,255,255,0.1);
  transform: translateY(-2px); box-shadow: 0 16px 36px rgba(0,0,0,0.3);
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.card-time { font-size: 0.73rem; color: var(--text-muted); }
.source-badge {
  display: inline-flex; padding: 3px 10px; border-radius: 6px; font-size: 0.7rem;
  font-weight: 600; letter-spacing: 0.3px; white-space: nowrap;
}
.news-card h3 { font-size: 1rem; font-weight: 600; line-height: 1.5; margin-bottom: 8px; }
.news-card h3 a { color: var(--text-primary); text-decoration: none; transition: color 0.2s; }
.news-card h3 a:hover { color: #a78bfa; }
.card-summary {
  font-size: 0.83rem; color: var(--text-secondary); line-height: 1.65;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 12px; }
.card-tags .tag {
  padding: 2px 7px; border-radius: 4px; font-size: 0.68rem;
  background: rgba(255,255,255,0.04); color: var(--text-muted);
}

/* ── Loading + Empty ────────────────── */
#loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 1rem; }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent-purple); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
#emptyState { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
footer { text-align: center; padding: 40px 0 20px; color: var(--text-muted); font-size: 0.78rem; }

@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 860px) { .news-grid { grid-template-columns: 1fr; } header h1 { font-size: 2rem; } .container { padding: 20px 14px; } }
@media (max-width: 480px) { .stats { flex-direction: column; align-items: stretch; } .date-nav { gap: 10px; } }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- ══ Password Gate ══ -->
<div id="pwGate">
  <div class="pw-box">
    <h2>AI Daily</h2>
    <p class="pw-sub">请输入访问密码</p>
    <input type="password" id="pwInput" placeholder="Password" autofocus>
    <button class="pw-btn" id="pwBtn">进入</button>
    <p class="pw-err" id="pwErr">密码错误，请重试</p>
  </div>
</div>

<!-- ══ Main App ══ -->
<div id="app">
<div class="container">
  <header>
    <h1>AI Daily</h1>
    <p class="subtitle">每日 AI 热点 · 自动采集 · 多源聚合</p>
  </header>

  <!-- Date Navigator -->
  <div class="date-nav">
    <button class="nav-btn" id="prevBtn" title="前一天">&#8592;</button>
    <div style="position:relative">
      <span class="current-date" id="currentDate" title="点击选择日期"></span>
      <div class="date-list" id="dateList"></div>
    </div>
    <button class="nav-btn" id="nextBtn" title="后一天">&#8594;</button>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsBar"></div>

  <!-- Summary -->
  <div id="summaryArea"></div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索关键词...">
  </div>

  <!-- Filter -->
  <div class="filter-bar" id="filterBar"></div>

  <!-- Trending -->
  <div id="trendingArea"></div>

  <!-- Loading -->
  <div id="loading"><div class="spinner"></div><br>加载中...</div>
  <div id="emptyState">没有找到匹配的内容</div>

  <!-- News Grid -->
  <div class="news-grid" id="newsGrid"></div>

  <footer>
    <p>AI Daily · 自动采集 · 数据来源: RSS + Web</p>
  </footer>
</div>
</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG — change the hash to set your password
// ══════════════════════════════════════════════════
const PW_HASH = 'f0873a474ae2b0e2b2dfe85bcff6b86ece9b2a849d07ed2be9de31f9a5b579bf'; // "aidaily2026"
const CN_PLATFORMS = new Set(['jiqizhixin','qbitai','36kr','infoq','weibo','xiaohongshu','douyin']);
const PLATFORM_LABELS = {techcrunch:'TechCrunch',theverge:'The Verge',arstechnica:'Ars Technica',venturebeat:'VentureBeat',wired:'Wired',mit:'MIT Tech',jiqizhixin:'机器之心',qbitai:'量子位','36kr':'36氪',infoq:'InfoQ',weibo:'微博'};

let manifest = null;
let currentIdx = 0;
let currentData = null;
let currentFilter = 'all';

// ── Auth ──
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function checkAuth() {
  const saved = localStorage.getItem('ai_daily_pw');
  if (saved === PW_HASH) { showApp(); return; }
  document.getElementById('pwGate').style.display = 'flex';
}

async function tryLogin() {
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    localStorage.setItem('ai_daily_pw', PW_HASH);
    showApp();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

document.getElementById('pwBtn').onclick = tryLogin;
document.getElementById('pwInput').onkeydown = e => { if (e.key === 'Enter') tryLogin(); };

async function showApp() {
  document.getElementById('pwGate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadManifest();
}

// ── Data Loading ──
async function loadManifest() {
  try {
    const r = await fetch('data/manifest.json?t=' + Date.now());
    manifest = await r.json();
    manifest.dates.sort((a,b) => b.localeCompare(a));
    currentIdx = 0;
    buildDateList();
    await loadDay(manifest.dates[0]);
  } catch(e) {
    document.getElementById('loading').innerHTML = '暂无数据，请等待首次采集完成';
  }
}

async function loadDay(dateStr) {
  const loading = document.getElementById('loading');
  const grid = document.getElementById('newsGrid');
  loading.style.display = 'block';
  grid.innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.title = 'AI Daily · ' + dateStr;

  try {
    const r = await fetch('data/' + dateStr + '.json?t=' + Date.now());
    currentData = await r.json();
    currentIdx = manifest.dates.indexOf(dateStr);
    renderAll();
  } catch(e) {
    loading.innerHTML = '该日期暂无数据';
  }
}

function buildDateList() {
  const list = document.getElementById('dateList');
  list.innerHTML = '';
  const weekdays = ['日','一','二','三','四','五','六'];
  manifest.dates.forEach((d, i) => {
    const btn = document.createElement('button');
    const dt = new Date(d + 'T00:00:00');
    btn.textContent = d + ' 周' + weekdays[dt.getDay()];
    if (i === currentIdx) btn.classList.add('active');
    btn.onclick = (e) => { e.stopPropagation(); list.classList.remove('open'); loadDay(d); };
    list.appendChild(btn);
  });
}

// ── Navigation ──
document.getElementById('currentDate').onclick = (e) => {
  e.stopPropagation();
  document.getElementById('dateList').classList.toggle('open');
};
document.addEventListener('click', e => {
  if (!e.target.closest('#dateList') && !e.target.closest('#currentDate')) {
    document.getElementById('dateList').classList.remove('open');
  }
});
document.getElementById('prevBtn').onclick = () => {
  if (currentIdx < manifest.dates.length - 1) loadDay(manifest.dates[currentIdx + 1]);
};
document.getElementById('nextBtn').onclick = () => {
  if (currentIdx > 0) loadDay(manifest.dates[currentIdx - 1]);
};

// ── Render ──
function renderAll() {
  document.getElementById('loading').style.display = 'none';
  const d = currentData;
  const dateStr = manifest.dates[currentIdx];

  document.getElementById('currentDate').textContent = dateStr;
  document.getElementById('prevBtn').disabled = currentIdx >= manifest.dates.length - 1;
  document.getElementById('nextBtn').disabled = currentIdx <= 0;

  const cnCount = d.items.filter(i => CN_PLATFORMS.has(i.platform)).length;
  const enCount = d.items.length - cnCount;
  const sources = new Set(d.items.map(i => i.source));

  document.getElementById('statsBar').innerHTML = [
    statCard('📰', d.items.length, '资讯总数'),
    statCard('🌐', sources.size, '数据源'),
    statCard('🇨🇳', cnCount, '国内资讯'),
    statCard('🌍', enCount, '海外资讯'),
  ].join('');

  renderSummary(d.summary);
  renderFilters(d.items);
  renderTrending(d.items);
  renderCards(d.items);

  buildDateList();
}

function statCard(icon, val, label) {
  return `<div class="stat-card"><span class="stat-icon">${icon}</span><div><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div></div>`;
}

function renderSummary(s) {
  const area = document.getElementById('summaryArea');
  if (!s || !s.overview) { area.innerHTML = ''; return; }
  let html = `<div class="summary-panel"><div class="summary-header"><h2>今日 AI 简报</h2><span class="ai-badge">AUTO</span></div>`;
  if (s.overview) html += `<div class="summary-overview">${s.overview}</div>`;
  if (s.highlights && s.highlights.length) {
    html += '<div class="summary-highlights">';
    s.highlights.forEach(h => {
      html += `<div class="highlight-item"><span class="highlight-tag">${h.tag}</span><div class="highlight-text">${h.text}</div></div>`;
    });
    html += '</div>';
  }
  if (s.trend) html += `<div class="summary-trend"><div style="font-size:0.76rem;font-weight:600;color:var(--accent-emerald);margin-bottom:6px;">趋势洞察</div>${s.trend}</div>`;
  html += '</div>';
  area.innerHTML = html;
}

function renderFilters(items) {
  const platforms = [...new Set(items.map(i => i.platform))].sort();
  let html = '<button class="filter-btn active" data-f="all">全部</button>';
  html += '<button class="filter-btn" data-f="cn">🇨🇳 国内</button>';
  html += '<button class="filter-btn" data-f="en">🌍 海外</button>';
  platforms.forEach(p => {
    if (PLATFORM_LABELS[p]) html += `<button class="filter-btn" data-f="${p}">${PLATFORM_LABELS[p]}</button>`;
  });
  const bar = document.getElementById('filterBar');
  bar.innerHTML = html;
  currentFilter = 'all';
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.f;
      applyFilters();
    };
  });
}

function renderTrending(items) {
  const counter = {};
  items.forEach(it => {
    const words = it.title.match(/[A-Za-z][A-Za-z0-9\-.]+|[\u4e00-\u9fff]{2,}/g) || [];
    words.forEach(w => {
      const k = w[0] === w[0].toUpperCase() || w.charCodeAt(0) > 127 ? w : w.toLowerCase();
      if (k.length >= 2) counter[k] = (counter[k] || 0) + 1;
    });
  });
  const top = Object.entries(counter).filter(([,c]) => c >= 2).sort((a,b) => b[1]-a[1]).slice(0,12);
  const area = document.getElementById('trendingArea');
  if (!top.length) { area.innerHTML = ''; return; }
  let html = '<div class="trending-section"><h3>热门关键词</h3><div class="trending-tags">';
  top.forEach(([w,c]) => { html += `<span class="trending-tag" data-kw="${w}">${w} <span style="opacity:0.5;font-size:0.7rem">x${c}</span></span>`; });
  html += '</div></div>';
  area.innerHTML = html;
  area.querySelectorAll('.trending-tag').forEach(t => {
    t.onclick = () => { document.getElementById('searchInput').value = t.dataset.kw; applyFilters(); };
  });
}

function renderCards(items) {
  const grid = document.getElementById('newsGrid');
  grid.innerHTML = '';
  items.forEach((it, i) => {
    const lang = CN_PLATFORMS.has(it.platform) ? 'zh' : 'en';
    const search = (it.title + ' ' + (it.summary||'') + ' ' + it.source).toLowerCase();
    let html = `<div class="news-card" data-platform="${it.platform}" data-lang="${lang}" data-search="${esc(search)}" style="animation-delay:${Math.min(i*0.03,0.3)}s">`;
    html += `<div class="card-header"><span class="source-badge" style="background:color-mix(in srgb, var(--${it.platform}, var(--general)) 15%, transparent); color:var(--${it.platform}, var(--general))">${esc(it.source)}</span>`;
    if (it.age_label) html += `<span class="card-time">${esc(it.age_label)}</span>`;
    html += '</div>';
    html += `<h3><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title)}</a></h3>`;
    if (it.summary) html += `<p class="card-summary">${esc(it.summary)}</p>`;
    if (it.tags && it.tags.length) {
      html += '<div class="card-tags">';
      it.tags.slice(0,5).forEach(t => { html += `<span class="tag">${esc(t)}</span>`; });
      html += '</div>';
    }
    html += '</div>';
    grid.insertAdjacentHTML('beforeend', html);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Filtering ──
document.getElementById('searchInput').oninput = applyFilters;

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.news-card');
  let visible = 0;
  cards.forEach(c => {
    const p = c.dataset.platform;
    let show = true;
    if (currentFilter === 'cn') show = CN_PLATFORMS.has(p);
    else if (currentFilter === 'en') show = !CN_PLATFORMS.has(p);
    else if (currentFilter !== 'all') show = p === currentFilter;
    if (show && q) show = c.dataset.search.includes(q);
    c.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}

// ── Init ──
checkAuth();
</script>
